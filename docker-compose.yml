services:
  db-sistema-ventas:
    image: postgres:18-alpine
    container_name: db-sistema-ventas-container
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql/data
  sistema-ventas:
    build: .
    container_name: sistema-ventas-container
    ports: 
      - "${PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      db-sistema-ventas:
        condition: service_healthy
volumes:
  postgres_data: