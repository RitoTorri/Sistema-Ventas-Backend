services:
  db-sistema-ventas:
    image: postgres:18-alpine
    container_name: db-sistema-ventas-container
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
  sistema-ventas:
    build: .
    container_name: sistema-ventas-container
    ports: 
      - "${PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      - db-sistema-ventas
volumes:
  postgres_data: